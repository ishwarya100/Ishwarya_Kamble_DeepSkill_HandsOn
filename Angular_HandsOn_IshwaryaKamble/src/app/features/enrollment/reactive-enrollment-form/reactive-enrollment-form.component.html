<h2 class="section-title"><app-icon name="sparkle" className="icon icon-lg"></app-icon>Enrollment Request</h2>
<p class="muted-text form-subtitle">Reactive form, built and validated entirely in code.</p>

<form [formGroup]="enrollForm" (ngSubmit)="onSubmit()" class="card">

  <div class="field-group">
    <label><app-icon name="user" className="icon-sm"></app-icon>Student Name</label>
    <input formControlName="studentName" />
    <span class="error-text" *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['required']">
      <app-icon name="warning" className="icon-sm"></app-icon>Name is required
    </span>
    <span class="error-text" *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['minlength']">
      <app-icon name="warning" className="icon-sm"></app-icon>Name must be at least 3 characters
    </span>
  </div>

  <div class="field-group">
    <label><app-icon name="mail" className="icon-sm"></app-icon>Student Email</label>
    <input formControlName="studentEmail" type="email" />
    <span class="muted-text" *ngIf="enrollForm.get('studentEmail')?.pending">Checking email availability...</span>
    <span class="error-text" *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']">
      <app-icon name="warning" className="icon-sm"></app-icon>This email is already taken
    </span>
  </div>

  <div class="field-group">
    <label><app-icon name="book" className="icon-sm"></app-icon>Course ID</label>
    <input formControlName="courseId" />
    <span class="error-text" *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">
      <app-icon name="warning" className="icon-sm"></app-icon>Course code starting with XX is not allowed.
    </span>
  </div>

  <div class="field-group">
    <label><app-icon name="layers" className="icon-sm"></app-icon>Preferred Semester</label>
    <select formControlName="preferredSemester">
      <option value="Odd">Odd</option>
      <option value="Even">Even</option>
    </select>
  </div>

  <div class="field-group checkbox-row">
    <label>
      <input formControlName="agreeToTerms" type="checkbox" />
      I agree to the enrollment terms
    </label>
  </div>

  <!-- dynamic form array, lets the student enroll in extra courses -->
  <div class="field-group">
    <label><app-icon name="plus" className="icon-sm"></app-icon>Additional Courses</label>
    <div class="array-row" *ngFor="let ctrl of additionalCourses.controls; let i = index">
      <input [formControl]="$any(ctrl)" placeholder="Course code" />
      <button type="button" class="btn btn-danger-outline" (click)="removeCourse(i)">
        <app-icon name="trash" className="icon-sm"></app-icon>
      </button>
    </div>
    <button type="button" class="btn btn-outline add-course-btn" (click)="addCourse()">
      <app-icon name="plus" className="icon-sm"></app-icon>Add Another Course
    </button>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-accent" [disabled]="enrollForm.invalid">
      <app-icon name="check" className="icon-sm"></app-icon>Submit
    </button>
  </div>

  <div class="success-banner" *ngIf="submitted">
    <app-icon name="check" className="icon-sm"></app-icon>You are now enrolled in this course!
  </div>
  <p class="error-text" *ngIf="courseNotFound">
    <app-icon name="warning" className="icon-sm"></app-icon>No course exists with that ID.
  </p>
</form>
